name: nurul-hikmah

# Development: docker compose up -d
#   Backend API:  http://localhost:${BACKEND_PORT:-8000}/api
#   Frontend:     http://localhost:${VITE_PORT:-5173}
#   MySQL:        localhost:${DB_PORT:-3307}
#
# Optional:
#   Nginx reverse proxy: docker compose --profile proxy up -d
#   Queue + Scheduler:   docker compose --profile workers up -d
#   Production:          make prod

services:
  backend:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/var/www/backend
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-nurul_hikmah}
      DB_USERNAME: ${DB_USERNAME:-nurul_hikmah}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: database
      BROADCAST_CONNECTION: log
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_SEED_IF_EMPTY: ${RUN_SEED_IF_EMPTY:-true}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    ports:
      - "${DB_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-nurul_hikmah}
      MYSQL_USER: ${DB_USERNAME:-nurul_hikmah}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - app-network

  nginx:
    profiles: ["proxy"]
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/backend/public:ro
      - ./backend/storage/app/public:/var/www/backend/storage/app/public:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - ./frontend/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
      - frontend_node_modules:/app/node_modules
      - vite_dev_cache:/tmp/vite-cache
    environment:
      CHOKIDAR_USEPOLLING: "${CHOKIDAR_USEPOLLING:-true}"
      VITE_CACHE_DIR: /tmp/vite-cache
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_API_PROXY_TARGET: http://backend:8000
      VITE_DEV_HMR_HOST: ${VITE_DEV_HMR_HOST:-localhost}
      VITE_DEV_HMR_PORT: ${VITE_DEV_HMR_PORT:-5173}
    depends_on:
      backend:
        condition: service_started
    networks:
      - app-network

  queue_worker:
    profiles: ["workers"]
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    command: php /var/www/backend/artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/backend
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-nurul_hikmah}
      DB_USERNAME: ${DB_USERNAME:-nurul_hikmah}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      RUN_MIGRATIONS: "false"
    depends_on:
      - backend
      - mysql
    networks:
      - app-network

  scheduler:
    profiles: ["workers"]
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    command: sh -c "while true; do php /var/www/backend/artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./backend:/var/www/backend
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-nurul_hikmah}
      DB_USERNAME: ${DB_USERNAME:-nurul_hikmah}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: file
      RUN_MIGRATIONS: "false"
    depends_on:
      - backend
      - mysql
    networks:
      - app-network

volumes:
  mysql_data:
    name: nurul_hikmah_mysql_data
  frontend_node_modules:
    name: nurul_hikmah_frontend_node_modules
  vite_dev_cache:
    name: nurul_hikmah_vite_dev_cache

networks:
  app-network:
    driver: bridge
