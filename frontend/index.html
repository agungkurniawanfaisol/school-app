<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="description" content="Sekolah Islam Terpadu Nurul Hikmah — pendidikan berkualitas dengan nilai-nilai Islami untuk generasi unggul." />
    <meta name="keywords" content="sekolah islam, nurul hikmah, pendidikan, PMB, pendaftaran siswa baru" />
    <meta name="author" content="Nurul Hikmah School" />
    <meta name="theme-color" content="#1a5f2a" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1a12" media="(prefers-color-scheme: dark)" />
    <meta property="og:title" content="Nurul Hikmah School" />
    <meta property="og:description" content="Sekolah Islam Terpadu — mendidik generasi berakhlak mulia dan berprestasi." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo-512.png" />
    <title>Nurul Hikmah School</title>
  </head>
  <body>
    <script>
      (function () {
        var key = 'nurul-hikmah-theme';
        var stored = localStorage.getItem(key);
        var dark =
          stored === 'dark' ||
          (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
        document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
